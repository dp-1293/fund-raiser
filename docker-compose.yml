services:
  mysql:
    image: mysql:8.0
    container_name: fundraise_pro_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fundraise_pro
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: fundraise_pro_backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=mysql://root:rootpassword@mysql:3306/fundraise_pro
      - JWT_SECRET=super_secret_jwt_access_key_fundraise_pro_2026
      - JWT_REFRESH_SECRET=super_secret_jwt_refresh_key_fundraise_pro_2026
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: fundraise_pro_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
